name: android-ci

# Sanity build of the Gradle app shell. The native engine (.so) is NOT built here — it needs the
# cross-compiled dependencies and, ultimately, your own game data to run. This just keeps the
# Android project (manifest, resources, Java glue, Gradle config) honest.

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android/**'

jobs:
  gradle-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
      - name: Lint the manifest & resources
        working-directory: android
        run: |
          echo "Gradle project files present:"
          test -f settings.gradle && test -f app/build.gradle && test -f app/src/main/AndroidManifest.xml
          echo "OK"
