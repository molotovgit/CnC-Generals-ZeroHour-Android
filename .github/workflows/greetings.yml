name: greetings

# Welcome first-time contributors automatically. actions/first-interaction only fires on a
# person's very first issue or PR in this repo, so regulars are never spammed.

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue here, appreciate it.


            Quick orientation so we can help fast. If this is a bug, the most useful things to include
            are your device model, SoC/GPU, and Android version, plus the app's private log — there's
            a note in CONTRIBUTING.md on how to pull it with `adb`. If it's a feature idea, don't worry
            about format, just say what you're after and why.


            One house rule worth stating up front: please don't attach or link any game data
            (`.big`/`.bik`/maps). Everyone brings their own retail files and this repo stays strictly
            code + docs. If you're just trying to get it running, `docs/SETUP-GAME-FILES.md` walks
            through the whole thing.


            Someone will get back to you. Thanks for taking the time.
          pr-message: >
            First PR here — thank you, this is genuinely appreciated.


            A couple of things that make review go smoothly: keep any Android-specific engine changes
            behind `#if defined(__ANDROID__)` so desktop builds stay untouched, and double-check there's
            no game data anywhere in the diff (`.big`/`.bik`/maps/APK) — that's the one hard rule. If you
            tested on a real arm64 device, mention the device + GPU + Android version in the description;
            it helps a lot when something is GPU-specific.


            CONTRIBUTING.md covers the rest, but don't stress about getting everything perfect on the
            first try — we'll work through it together in review. Thanks for contributing.
