name: GeneralsX CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      zh-should-build: ${{ steps.filter.outputs.zh-should-build }}
      base-should-build: ${{ steps.filter.outputs.base-should-build }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Filter Changed Paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          token: ''
          filters: |
            zh-should-build:
              - 'GeneralsMD/**'
              - 'Core/**'
              - 'Dependencies/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - '.github/workflows/build-*.yml'
              - '.github/workflows/ci.yml'
            base-should-build:
              - 'Generals/**'
              - 'Core/**'
              - 'Dependencies/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - '.github/workflows/build-*.yml'
              - '.github/workflows/ci.yml'

      - name: Build Trigger Summary
        run: |
          echo "### 🔍 CI Trigger (Granular)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.filter.outputs.zh-should-build }}" = "true" ]; then
            echo "| GeneralsX ZH (GeneralsMD) | ✅ Changes detected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GeneralsX ZH (GeneralsMD) | ⏭️ No changes |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.filter.outputs.base-should-build }}" = "true" ]; then
            echo "| GeneralsX Base (Generals) | ✅ Changes detected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GeneralsX Base (Generals) | ⏭️ No changes |" >> $GITHUB_STEP_SUMMARY
          fi

  build-linux-flatpak:
    name: Build Linux Flatpak
    needs: detect-changes
    if: needs.detect-changes.outputs.zh-should-build == 'true' || needs.detect-changes.outputs.base-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-linux-flatpak.yml
    with:
      preset: linux64-deploy
    secrets: inherit

  build-macos:
    name: Build macOS
    needs: detect-changes
    if: needs.detect-changes.outputs.zh-should-build == 'true' || needs.detect-changes.outputs.base-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-macos.yml
    with:
      preset: macos-vulkan
    secrets: inherit

  replay-test-linux:
    name: Replay Tests (linux)
    needs: [build-linux-flatpak]
    if: needs.build-linux-flatpak.result == 'success'
    uses: ./.github/workflows/replay-tests.yml
    with:
      platform: linux-flatpak
      game-artifact: linux-flatpak-generalsxzh-linux64-deploy
    secrets:
      ASSETS_KEY: ${{ secrets.ASSETS_KEY }}

  replay-test-macos:
    name: Replay Tests (macos)
    needs: [build-macos]
    if: needs.build-macos.result == 'success'
    uses: ./.github/workflows/replay-tests.yml
    with:
      platform: macos
      game-artifact: macos-generalsxzh-app
    secrets:
      ASSETS_KEY: ${{ secrets.ASSETS_KEY }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-linux-flatpak, build-macos, replay-test-linux, replay-test-macos]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "### GeneralsX Multi-Platform Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux Flatpak | ${{ needs.build-linux-flatpak.result == 'success' && '✅ Success' || needs.build-linux-flatpak.result == 'skipped' && '⏭️ Skipped' || needs.build-linux-flatpak.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS (arm64) | ${{ needs.build-macos.result == 'success' && '✅ Success' || needs.build-macos.result == 'skipped' && '⏭️ Skipped' || needs.build-macos.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Replay Tests | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux ZH replays | ${{ needs.replay-test-linux.result == 'success' && '✅ Pass' || needs.replay-test-linux.result == 'skipped' && '⏭️ Skipped' || needs.replay-test-linux.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS ZH replays | ${{ needs.replay-test-macos.result == 'success' && '✅ Pass' || needs.replay-test-macos.result == 'skipped' && '⏭️ Skipped' || needs.replay-test-macos.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if Any Build or Replay Test Failed
        if: |
          needs.build-linux-flatpak.result == 'failure' ||
          needs.build-macos.result == 'failure' ||
          needs.replay-test-linux.result == 'failure' ||
          needs.replay-test-macos.result == 'failure'
        run: exit 1
